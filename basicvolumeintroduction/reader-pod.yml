apiVersion: v1
kind: Pod
metadata:
  name: reader-pod
spec:
  containers:
  - name: reader
    image: busybox
    command:
      - sh
      - -c
      - |
        while true
        do
          cat /shared/data.txt
          echo "------------------"
          sleep 10
        done

    volumeMounts:
    - name: shared-storage
      mountPath: /shared

  volumes:
  - name: shared-storage
    hostPath:
      path: /data/shared
