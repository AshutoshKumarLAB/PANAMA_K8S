apiVersion: v1
kind: Pod
metadata:
  name: mount-demo
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: config-vol
      mountPath: /etc/config
    - name: secret-vol
      mountPath: /etc/secret
  volumes:
  - name: config-vol
    configMap:
      name: web-config
  - name: secret-vol
    secret:
      secretName: db-secret
