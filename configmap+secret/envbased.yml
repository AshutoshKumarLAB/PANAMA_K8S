apiVersion: v1
kind: Pod
metadata:
  name: env-demo
spec:
  containers:
  - name: demo-container
    image: nginx
    env:
    - name: COLOR
      valueFrom:
        configMapKeyRef:
          name: my-config
          key: APP_COLOR
    - name: MODE
      valueFrom:
        configMapKeyRef:
          name: my-config
          key: APP_MODE
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: my-secret
          key: DB_USER
    - name: DB_PASS
      valueFrom:
        secretKeyRef:
          name: my-secret
          key: DB_PASS
