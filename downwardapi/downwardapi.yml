apiVersion: v1
kind: Pod
metadata:
  name: downwardapi-demo

spec:
  containers:
  - name: app
    image: busybox

    command:
      - sh
      - -c
      - |
        while true
        do
          echo "Pod Name: $MY_POD_NAME"
          echo "Namespace: $MY_NAMESPACE"
          echo "Node Name: $MY_NODE"
          echo "Pod IP: $MY_POD_IP"
          echo "----------------------"
          sleep 10
        done

    env:

    - name: MY_POD_NAME
      valueFrom:
        fieldRef:
          fieldPath: metadata.name

    - name: MY_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace

    - name: MY_NODE
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

    - name: MY_POD_IP
      valueFrom:
        fieldRef:
          fieldPath: status.podIP
